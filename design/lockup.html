<!-- @dsCard group="Brand" name="Lockup" subtitle="Wide link-card, 1.91:1" width="760" height="540" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lockup — Bounded Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="../tokens/tokens.css">
  <link rel="stylesheet" href="./preview.css">
  <style>
    .lock { width: 100%; max-width: 640px; height: auto; border-radius: var(--bs-radius-lg); display: block; }
  </style>
</head>
<body>
  <header class="bs-head">
    <p class="eyebrow">Brand</p>
    <h1 class="bs-text-h2">Lockup</h1>
    <p>Wide 1.91:1 (1200×630) lockup for social / link cards — mark + wordmark +
       slug + tagline with safe margins. Use this where the square avatar would center-crop.</p>
  </header>
  <div class="assets" style="grid-template-columns:1fr;">
    <div class="asset">
      <img class="lock" src="../lockup/lockup-forest.svg" alt="Forest lockup">
      <div class="caption">lockup-forest.svg · repo social preview</div>
    </div>
    <div class="asset">
      <img class="lock" src="../lockup/lockup-light.svg" alt="Light lockup">
      <div class="caption">lockup-light.svg · light / photographic</div>
    </div>
  </div>
</body>
</html>
