name: tokens

on:
  push:
    paths:
      - "tokens/**"
      - ".github/workflows/tokens.yml"
  pull_request:
    paths:
      - "tokens/**"
      - ".github/workflows/tokens.yml"

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fail on tokens.css drift
        run: node tokens/build-tokens.mjs --check
